name: Build and (optional) Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
      - name: Ensure AI key is provided
        run: |
          if [ -z "$AI_API_KEY" ]; then
            echo "AI_API_KEY is not set. Add it in Settings → Secrets and variables → Actions → New repository secret (AI_API_KEY)."
            exit 1
          fi
      - run: npm run build
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}

      - name: Deploy to Vercel (optional)
        if: ${{ secrets.VERCEL_TOKEN }}
        uses: amondt/action-vercel@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
